<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClubConnect | Student Events Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <header>
    <nav>
      <a href="#" class="logo"><i class="fas fa-handshake"></i> ClubConnect</a>
      <div class="nav-links">
        <a onclick="showSection('events')" id="nav-events" class="active">Events</a>
        <a onclick="showSection('my-events')" id="nav-my-events">My Events</a>
      </div>
      <div class="nav-actions">
        <button id="themeToggle" class="btn-icon"><i class="fas fa-moon"></i></button>
      </div>
    </nav>
  </header>

  <div class="action-bar">
    <div class="search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="globalSearch" placeholder="Search for events, workshops, or festivals..." onkeyup="handleSearch()">
    </div>
  </div>

  <main class="container">
    <section id="events" class="section active">
      <div class="section-header">
        <h2>Discovery upcoming events</h2>
        <p>Explore what's happening in your campus clubs.</p>
      </div>
      <div id="eventList" class="grid"></div>
    </section>

    <section id="my-events" class="section">
      <div class="section-header">
        <h2>My Schedule</h2>
        <p>Your personalized lineup of upcoming club activities.</p>
      </div>
      <div id="myEventList" class="grid"></div>
    </section>
  </main>

  <div id="eventModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal('eventModal')">&times;</span>
      <div id="modalInjectedContent">
        </div>
      <div class="modal-footer">
        <div id="modalActions"></div>
        <button class="btn btn-share" onclick="shareEvent()">
          <i class="fas fa-share-nodes"></i> Share with Friends
        </button>
      </div>
    </div>
  </div>

  <div id="reminder-toast">
    <i class="fas fa-check-circle"></i> <span id="toast-text"></span>
  </div>

  <footer>
    <div class="footer-content">
      <p>© 2025 Clubconnect. All rights reserved.</p>
      <p>
        <a href="#">Privacy Policy</a> • 
        <a href="#">Terms of Service</a> • 
        <a href="#">Contact</a>
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
